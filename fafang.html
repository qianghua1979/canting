<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>餐票发放确认</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f5f5f5;padding:15px;max-width:500px;margin:0 auto}
.card{background:white;border-radius:12px;padding:20px;margin-bottom:15px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
h3{margin-bottom:12px;color:#333}
.row{display:flex;padding:10px 0;border-bottom:1px solid #f0f0f0}
.label{color:#888;width:80px;flex-shrink:0;font-size:15px}
.value{color:#333;font-weight:500;font-size:15px;flex:1}
.badge{display:inline-block;padding:4px 14px;border-radius:20px;font-size:14px;font-weight:bold}
.badge-w{background:#FFF3CD;color:#856404}
.badge-d{background:#D4EDDA;color:#155724}
.btn{display:block;width:100%;padding:15px;border:none;border-radius:10px;font-size:18px;font-weight:bold;cursor:pointer;margin:10px 0;text-align:center;-webkit-tap-highlight-color:transparent}
.btn-photo{background:#0078D4;color:white}
.btn-submit{background:#107C10;color:white}
.btn:disabled{background:#ccc;color:#888}
.preview{width:100%;max-height:300px;object-fit:contain;border-radius:8px;margin:10px 0;display:none}
.hidden{display:none}
.warn{color:#D32F2F;font-size:16px;font-weight:bold;text-align:center;padding:10px}
</style>
</head>
<body>
<div id="loading" style="text-align:center;padding:40px;color:#999;font-size:16px">⏳ 加载中...</div>

<div id="main" class="hidden">
    <div class="card">
        <h3>📋 餐票发放</h3>
        <div id="fields"></div>
        <div class="row">
            <span class="label">状态：</span>
            <span id="statusBadge" class="badge badge-w"></span>
        </div>
    </div>

    <div id="actionCard" class="card hidden">
        <h3>📸 发放操作</h3>
        <input type="file" id="photoInput" accept="image/*" capture="environment" hidden>
        <img id="photoPreview" class="preview" alt="照片预览">
        <button class="btn btn-photo" id="btnPhoto">📷 拍照上传领取照片</button>
        <button class="btn btn-submit" id="btnSubmit" disabled>✅ 提交</button>
    </div>

    <div id="doneCard" class="card hidden" style="text-align:center">
        <p class="warn">⚠️ 已领取，请勿重复发放。</p>
    </div>
</div>

<script>
var P="https://defaultb9f57165cf8d4d509aab1bad15a033.f5.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/56cd65b06b284575924a61d6a4095836/triggers/manual/paths/invoke?api-version=1";
var p=new URL(window.location.href).searchParams;
var itemId=p.get("itemId");
var done=p.get("done");

var fieldDefs=[
    {label:"申请单号",key:"applyId"},
    {label:"申请日期",key:"applyDate"},
    {label:"申请人",key:"applicant"},
    {label:"成本中心",key:"costCenter"},
    {label:"用餐时间",key:"mealTime"},
    {label:"餐厅",key:"restaurant"},
    {label:"用餐人数",key:"people"},
    {label:"餐标",key:"mealStandard"},
    {label:"费用",key:"cost"}
];

if(!itemId){
    document.getElementById("loading").innerHTML='<p style="color:red">❌ 无效链接，缺少申请ID</p>';
} else {
    var fieldsHtml="";
    for(var i=0;i<fieldDefs.length;i++){
        fieldsHtml+='<div class="row"><span class="label">'+fieldDefs[i].label+'：</span><span class="value">'+(p.get(fieldDefs[i].key)||"")+'</span></div>';
    }
    document.getElementById("fields").innerHTML=fieldsHtml;

    if(done==="1"){
        document.getElementById("statusBadge").textContent="已发放";
        document.getElementById("statusBadge").className="badge badge-d";
        document.getElementById("doneCard").classList.remove("hidden");
    } else {
        document.getElementById("statusBadge").textContent="未发放";
        document.getElementById("statusBadge").className="badge badge-w";
        document.getElementById("actionCard").classList.remove("hidden");
        setupPhoto();
    }

    document.getElementById("loading").classList.add("hidden");
    document.getElementById("main").classList.remove("hidden");
}

function setupPhoto(){
    var input=document.getElementById("photoInput");
    var preview=document.getElementById("photoPreview");
    var btnP=document.getElementById("btnPhoto");
    var btnS=document.getElementById("btnSubmit");
    var b64=null;

    btnP.onclick=function(){input.click()};
    input.onchange=function(e){
        var f=e.target.files[0];if(!f)return;
        var reader=new FileReader();
        reader.onload=function(ev){
            var img=new Image();
            img.onload=function(){
                var c=document.createElement("canvas"),w=img.width,h=img.height,mw=800;
                if(w>mw){h=(mw/w)*h;w=mw}
                c.width=w;c.height=h;
                c.getContext("2d").drawImage(img,0,0,w,h);
                b64=c.toDataURL("image/jpeg",0.7);
                preview.src=b64;preview.style.display="block";
                btnP.textContent="📷 重新拍照";btnS.disabled=false;
            };
            img.src=ev.target.result;
        };
        reader.readAsDataURL(f);
    };

    btnS.onclick=async function(){
        if(!b64){alert("⚠️ 请先拍照");return}
        btnS.disabled=true;btnS.textContent="⏳ 提交中...";
        try{
            var r=await fetch(P,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({itemId:parseInt(itemId),photo:b64,fileName:"发放_"+itemId+"_"+Date.now()+".jpg"})});
            if(r.ok){alert("✅ 发放成功！");location.reload();}
            else{alert("❌ 提交失败，请重试");btnS.disabled=false;btnS.textContent="✅ 提交";}
        }catch(e){alert("❌ 网络错误");btnS.disabled=false;btnS.textContent="✅ 提交";}
    };
}
</script>
</body>
</html>
